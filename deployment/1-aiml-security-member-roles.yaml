AWSTemplateFormatVersion: 2010-09-09
Description: This template deploys the roles needed for the AIML Security Assessment to run in each member account.

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: Trust Configuration
        Parameters:
          - ManagementAccountID
    ParameterLabels:
      ManagementAccountID:
        default: Central assessment account ID

Parameters:
  ManagementAccountID:
    Description: >
      The 12-digit AWS account ID where the multi-account AIML Security
      Assessment CodeBuild project runs. This can be the AWS Organizations
      management account or a delegated administrator/central tooling account.
    Type: String
    AllowedPattern: "^\\d{12}$"
    ConstraintDescription: Enter a 12-digit AWS account ID with no spaces.

Resources:
  MemberRole:
    Type: "AWS::IAM::Role"
    Properties:
      Path: "/service-role/"
      RoleName: AIMLSecurityMemberRole
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:${AWS::Partition}:iam::${ManagementAccountID}:root"
            Action:
              - "sts:AssumeRole"
            Condition:
              ArnEquals:
                aws:PrincipalArn: !Sub arn:${AWS::Partition}:iam::${ManagementAccountID}:role/service-role/MultiAccountCodeBuildRole
      Policies:
        - PolicyName: AIMLSecurityAssessmentPermissions
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # IAM Permissions for assessment
              - Effect: Allow
                Action:
                  - iam:ListRoles
                  - iam:ListUsers
                  - iam:ListAttachedRolePolicies
                  - iam:ListAttachedUserPolicies
                  - iam:ListRolePolicies
                  - iam:ListUserPolicies
                  - iam:GetRolePolicy
                  - iam:GetUserPolicy
                  - iam:GetPolicy
                  - iam:GetPolicyVersion
                  - iam:GenerateServiceLastAccessedDetails
                  - iam:GetServiceLastAccessedDetails
                  - iam:GetRole
                  - sts:GetCallerIdentity
                Resource: "*"
              # Bedrock Assessment Permissions
              - Effect: Allow
                Action:
                  - bedrock:ListGuardrails
                  - bedrock:GetGuardrail
                  - bedrock:GetModelInvocationLoggingConfiguration
                  - bedrock:ListCustomModels
                  - bedrock:GetCustomModel
                  - bedrock:GetModelCustomizationJob
                  - bedrock:ListFlows
                  - bedrock:GetFlow
                  # Model evaluation (BR-18, BR-25)
                  - bedrock:ListEvaluationJobs
                  # Imported custom models (BR-30)
                  - bedrock:ListImportedModels
                  - bedrock:GetImportedModel
                  # Batch inference jobs (BR-31)
                  - bedrock:ListModelInvocationJobs
                Resource: "*"
              # Bedrock Agent Permissions (Agents for Amazon Bedrock)
              - Effect: Allow
                Action:
                  - bedrock:ListPrompts
                  - bedrock:GetPrompt
                  - bedrock:ListAgents
                  - bedrock:GetAgent
                  - bedrock:ListKnowledgeBases
                  - bedrock:GetKnowledgeBase
                  # Agent action groups (BR-21)
                  - bedrock:ListAgentActionGroups
                  - bedrock:GetAgentActionGroup
                Resource: "*"
              # Bedrock cross-account / quota / monitoring assessment
              # (BR-15 organizational guardrails, BR-22 service quotas,
              # BR-32 CloudWatch alarms)
              - Effect: Allow
                Action:
                  - organizations:DescribeOrganization
                  - organizations:ListRoots
                  - organizations:ListPolicies
                  - servicequotas:ListServiceQuotas
                  - servicequotas:GetServiceQuota
                  - cloudwatch:DescribeAlarms
                Resource: "*"
              # Bedrock AgentCore Permissions
              - Effect: Allow
                Action:
                  - bedrock-agentcore:ListAgentRuntimes
                  - bedrock-agentcore:GetAgentRuntime
                  - bedrock-agentcore:ListMemories
                  - bedrock-agentcore:GetMemory
                  - bedrock-agentcore:ListGateways
                  - bedrock-agentcore:GetGateway
                  - bedrock-agentcore:ListPolicyEngines
                  - bedrock-agentcore:GetPolicyEngine
                  - bedrock-agentcore:GetResourcePolicy
                Resource: "*"
              # SageMaker Assessment Permissions
              - Effect: Allow
                Action:
                  - sagemaker:ListNotebookInstances
                  - sagemaker:DescribeNotebookInstance
                  - sagemaker:ListDomains
                  - sagemaker:DescribeDomain
                  - sagemaker:ListTrainingJobs
                  - sagemaker:DescribeTrainingJob
                  - sagemaker:ListModelPackageGroups
                  - sagemaker:ListModelPackages
                  - sagemaker:DescribeModelPackage
                  - sagemaker:ListFeatureGroups
                  - sagemaker:DescribeFeatureGroup
                  - sagemaker:ListPipelines
                  - sagemaker:ListPipelineExecutions
                  - sagemaker:ListProcessingJobs
                  - sagemaker:DescribeProcessingJob
                  - sagemaker:ListMonitoringSchedules
                  - sagemaker:DescribeMonitoringSchedule
                  - sagemaker:ListModels
                  - sagemaker:DescribeModel
                  - sagemaker:ListEndpoints
                  - sagemaker:DescribeEndpoint
                  - sagemaker:ListDataQualityJobDefinitions
                  - sagemaker:DescribeDataQualityJobDefinition
                  # Additional SageMaker Security Hub Controls (SM.10-15)
                  - sagemaker:ListTransformJobs
                  - sagemaker:DescribeTransformJob
                  - sagemaker:ListHyperParameterTuningJobs
                  - sagemaker:DescribeHyperParameterTuningJob
                  - sagemaker:ListCompilationJobs
                  - sagemaker:DescribeCompilationJob
                  - sagemaker:ListAutoMLJobs
                  - sagemaker:DescribeAutoMLJob
                  # Model Governance Permissions
                  - sagemaker:ListExperiments
                  - sagemaker:DescribeExperiment
                  - sagemaker:ListTrials
                  - sagemaker:DescribeTrial
                  - sagemaker:ListAssociations
                Resource: "*"
              # CloudTrail Permissions
              - Effect: Allow
                Action:
                  - cloudtrail:ListTrails
                  - cloudtrail:GetTrail
                  - cloudtrail:GetEventSelectors
                  - cloudtrail:GetTrailStatus
                Resource: "*"
              # Lambda Permissions
              - Effect: Allow
                Action:
                  - lambda:ListFunctions
                  # Read agent action-group Lambda execution role (BR-21)
                  - lambda:GetFunction
                Resource: "*"
              # ECS Permissions
              - Effect: Allow
                Action:
                  - ecs:ListClusters
                  - ecs:ListTasks
                  - ecs:DescribeTasks
                Resource: "*"
              # EC2 Permissions
              - Effect: Allow
                Action:
                  - ec2:DescribeVpcEndpoints
                  - ec2:DescribeVpcs
                  - ec2:DescribeSubnets
                  - ec2:DescribeRouteTables
                  - ec2:DescribeNatGateways
                Resource: "*"
              # ECR Permissions
              - Effect: Allow
                Action:
                  - ecr:DescribeRepositories
                  - ecr:GetRepositoryPolicy
                Resource: "*"
              # CloudWatch Logs Permissions
              - Effect: Allow
                Action:
                  - logs:DescribeLogGroups
                  - logs:DescribeLogStreams
                Resource: "*"
              # S3 Bucket Permissions for encryption checks
              - Effect: Allow
                Action:
                  - s3:GetBucketEncryption
                  - s3:GetEncryptionConfiguration
                  - s3:GetBucketVersioning
                  - s3:GetBucketTagging
                  - s3:HeadBucket
                Resource: "arn:aws:s3:::*"
              # KMS Permissions
              - Effect: Allow
                Action:
                  - kms:DescribeKey
                  - kms:ListAliases
                Resource: "*"
              # GuardDuty Permissions
              - Effect: Allow
                Action:
                  - guardduty:ListDetectors
                  - guardduty:GetDetector
                  - guardduty:GetFindings
                  - guardduty:ListFindings
                  - guardduty:GetFindingsStatistics
                  - guardduty:ListPublishingDestinations
                  - guardduty:ListTagsForResource
                  - guardduty:GetMemberDetectors
                  - guardduty:DescribeMalwareScans
                  - guardduty:GetRemainingFreeTrialDays
                  - guardduty:GetUsageStatistics
                Resource: "*"
              # FinServ GenAI Risk Assessment Permissions (FS-01 to FS-69)
              # Read-only list/describe/get actions required by the 64 FinServ
              # security checks. Resource: "*" is required for inventory-style
              # checks where resource ARNs are not known in advance. Validated
              # with cfn-lint (no unrecognized actions).
              - Effect: Allow
                Sid: FinServGenAIRiskAssessmentPermissions
                Action:
                  # WAF / Shield (FS-01)
                  - wafv2:ListWebACLs
                  - wafv2:GetWebACL
                  - shield:DescribeSubscription
                  # API Gateway (FS-02, FS-68, FS-69)
                  - apigateway:GET
                  # Service Quotas (FS-03)
                  - servicequotas:ListServiceQuotas
                  - servicequotas:ListAWSDefaultServiceQuotas
                  # Cost Explorer / Budgets (FS-04, FS-06)
                  - ce:GetAnomalyMonitors
                  - budgets:ViewBudget
                  # CloudWatch / Logs (FS-05, FS-11, FS-43)
                  - cloudwatch:DescribeAlarms
                  - logs:DescribeAccountPolicies
                  # Bedrock — guardrails, models, evaluation (FS-15, FS-27..50, FS-59..63)
                  - bedrock:ListGuardrails
                  - bedrock:GetGuardrail
                  - bedrock:ListFoundationModels
                  - bedrock:ListCustomModels
                  - bedrock:ListEvaluationJobs
                  # Bedrock — agents and knowledge bases (FS-07, FS-24, FS-31, FS-33, FS-48, FS-61, FS-65)
                  - bedrock:ListAgents
                  - bedrock:GetAgent
                  - bedrock:ListKnowledgeBases
                  - bedrock:GetKnowledgeBase
                  - bedrock:ListDataSources
                  - bedrock:GetDataSource
                  # Bedrock AgentCore (FS-08, FS-66)
                  - bedrock-agentcore:ListAgentRuntimes
                  - bedrock-agentcore:GetAgentRuntime
                  - bedrock-agentcore:ListGateways
                  - bedrock-agentcore:GetGateway
                  # Lambda — concurrency / agent transaction checks (FS-09, FS-67, FS-69)
                  - lambda:ListFunctions
                  - lambda:GetFunctionConcurrency
                  # Step Functions — human-in-the-loop / rate checks (FS-10, FS-11)
                  - states:ListStateMachines
                  - states:DescribeStateMachine
                  # Organizations — SCP model access restrictions (FS-12)
                  - organizations:ListPolicies
                  - organizations:DescribePolicy
                  # SageMaker — inventory / monitoring / bias / cards (FS-13, FS-20, FS-39..42, FS-61, FS-63)
                  - sagemaker:ListMonitoringSchedules
                  - sagemaker:ListFeatureGroups
                  - sagemaker:ListModels
                  - sagemaker:ListModelCards
                  - sagemaker:ListTags
                  # S3 — bucket metadata (FS-20, FS-21, FS-46, FS-65)
                  - s3:ListAllMyBuckets
                  - s3:GetBucketVersioning
                  - s3:GetBucketTagging
                  - s3:GetBucketNotification
                  # ECR — image scanning (FS-16)
                  - ecr:DescribeRepositories
                  # OpenSearch Serverless — KB vector store (FS-25, FS-26)
                  - aoss:ListSecurityPolicies
                  # Macie — PII detection on training data (FS-44)
                  - macie2:GetMacieSession
                  # EventBridge — KB integrity monitoring (FS-33, FS-65)
                  - events:ListRules
                  # EventBridge Scheduler (KB sync schedules - FS-61).
                  # AWS-recommended scheduling approach; classic EventBridge rules are legacy.
                  - scheduler:ListSchedules
                  # Bedrock Automated Reasoning (GA August 2025).
                  # Required for check_automated_reasoning_policies() (FS-27).
                  - bedrock:ListAutomatedReasoningPolicies
                  - bedrock:ListTagsForResource
                  # Config — model onboarding governance (FS-14)
                  - config:DescribeConfigRules
                Resource: "*"
              # Allow access to central assessment bucket
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - "arn:aws:s3:::*aiml*security*assessment*"
                  - "arn:aws:s3:::*aiml*security*assessment*/*"
              # Allow Lambda execution roles to access central bucket
              - Effect: Allow
                Action:
                  - sts:AssumeRole
                Resource: "arn:aws:iam::*:role/aiml-security-*"
              # SAM/CloudFormation deployment permissions (required for multi-account flow)
              - Effect: Allow
                Action:
                  - cloudformation:CreateStack
                  - cloudformation:UpdateStack
                  - cloudformation:DeleteStack
                  - cloudformation:DescribeStacks
                  - cloudformation:DescribeStackEvents
                  - cloudformation:GetTemplate
                  - cloudformation:CreateChangeSet
                  - cloudformation:DescribeChangeSet
                  - cloudformation:ExecuteChangeSet
                  - cloudformation:DeleteChangeSet
                  - cloudformation:GetTemplateSummary
                  - cloudformation:ListStackResources
                Resource:
                  - !Sub "arn:${AWS::Partition}:cloudformation:*:${AWS::AccountId}:stack/aiml-security-*/*"
                  - !Sub "arn:${AWS::Partition}:cloudformation:*:${AWS::AccountId}:stack/aws-sam-cli-managed-default/*"
              - Effect: Allow
                Action:
                  - cloudformation:GetTemplateSummary
                  - cloudformation:CreateChangeSet
                Resource:
                  - !Sub "arn:${AWS::Partition}:cloudformation:*:aws:transform/Serverless-2016-10-31"
              # Lambda deployment permissions
              - Effect: Allow
                Action:
                  - lambda:CreateFunction
                  - lambda:DeleteFunction
                  - lambda:GetFunction
                  - lambda:GetFunctionConfiguration
                  - lambda:UpdateFunctionCode
                  - lambda:UpdateFunctionConfiguration
                  - lambda:AddPermission
                  - lambda:RemovePermission
                  - lambda:TagResource
                  - lambda:UntagResource
                  - lambda:ListTags
                  - lambda:InvokeFunction
                Resource:
                  - !Sub "arn:${AWS::Partition}:lambda:*:${AWS::AccountId}:function:aiml-security-*"
              # IAM role management for SAM-deployed Lambda roles
              - Effect: Allow
                Action:
                  - iam:CreateRole
                  - iam:DeleteRole
                  - iam:GetRole
                  - iam:PassRole
                  - iam:AttachRolePolicy
                  - iam:DetachRolePolicy
                  - iam:PutRolePolicy
                  - iam:DeleteRolePolicy
                  - iam:GetRolePolicy
                  - iam:TagRole
                  - iam:UntagRole
                Resource:
                  - !Sub "arn:${AWS::Partition}:iam::${AWS::AccountId}:role/aiml-security-*"
              # Step Functions deployment permissions
              - Effect: Allow
                Action:
                  - states:CreateStateMachine
                  - states:DeleteStateMachine
                  - states:DescribeStateMachine
                  - states:UpdateStateMachine
                  - states:TagResource
                  - states:UntagResource
                  - states:StartExecution
                  - states:DescribeExecution
                  - states:ListExecutions
                Resource:
                  - !Sub "arn:${AWS::Partition}:states:*:${AWS::AccountId}:stateMachine:AIMLAssessment*"
                  - !Sub "arn:${AWS::Partition}:states:*:${AWS::AccountId}:execution:AIMLAssessment*:*"
              # S3 permissions for SAM deployment artifacts and assessment results
              - Effect: Allow
                Action:
                  - s3:CreateBucket
                  - s3:DeleteBucket
                  - s3:PutBucketPolicy
                  - s3:GetBucketPolicy
                  - s3:DeleteBucketPolicy
                  - s3:PutBucketVersioning
                  - s3:GetBucketVersioning
                  - s3:PutBucketPublicAccessBlock
                  - s3:GetBucketPublicAccessBlock
                  - s3:PutBucketTagging
                  - s3:GetBucketTagging
                  - s3:PutEncryptionConfiguration
                  - s3:GetEncryptionConfiguration
                  - s3:GetBucketLocation
                  - s3:ListBucket
                  - s3:PutObject
                  - s3:GetObject
                  - s3:DeleteObject
                  - s3:DeleteObjectVersion
                Resource:
                  - "arn:aws:s3:::aiml-security-*"
                  - "arn:aws:s3:::aiml-security-*/*"
                  - "arn:aws:s3:::aws-sam-cli-managed-default-*"
                  - "arn:aws:s3:::aws-sam-cli-managed-default-*/*"


Outputs:
  MemberRoleArn:
    Description: ARN of the AIML Security Member Role
    Value: !GetAtt MemberRole.Arn
